<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Topics — Führerschein Trainer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0f12; --surface: #161920; --surface2: #1e2229;
    --border: rgba(255,255,255,0.07); --text: #e8eaf0; --muted: #7a7f8e;
    --accent: #4fffb0; --accent2: #ff6b4a; --warn: #ffd166; --blue: #5b9cf6;
    --font: 'Syne', sans-serif; --mono: 'DM Mono', monospace;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }

  .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0.75rem 1.5rem; display: flex; align-items: center; gap: 1rem; }
  .topbar a { color: var(--muted); text-decoration: none; font-size: 0.85rem; font-family: var(--mono); }
  .topbar a:hover { color: var(--text); }
  .topbar-title { font-size: 0.85rem; color: var(--muted); font-family: var(--mono); }

  .page { max-width: 760px; margin: 0 auto; padding: 2rem 1rem 4rem; }

  h2 { font-size: 1.6rem; font-weight: 800; margin-bottom: 0.4rem; letter-spacing: -0.02em; }
  .subtitle { color: var(--muted); font-family: var(--mono); font-size: 0.82rem; margin-bottom: 2rem; }

  .overall-bar-wrap { background: var(--surface2); border-radius: 100px; height: 6px; margin-bottom: 2rem; overflow: hidden; }
  .overall-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--blue)); border-radius: 100px; transition: width 0.8s ease; }

  .topic-list { display: flex; flex-direction: column; gap: 1rem; }

  .topic-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    border-left: 4px solid var(--card-color, var(--blue));
  }

  .card-top { padding: 1.2rem 1.5rem 1rem; }
  .card-meta { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.5rem; flex-wrap: wrap; }
  .card-num { font-family: var(--mono); font-size: 10px; color: var(--muted); }
  .card-pct {
    font-family: var(--mono); font-size: 11px;
    padding: 2px 9px; border-radius: 100px;
    background: rgba(79,255,176,0.1); color: var(--accent);
    border: 1px solid rgba(79,255,176,0.25);
    margin-left: auto;
  }
  .card-pct.warn { background: rgba(255,209,102,0.1); color: var(--warn); border-color: rgba(255,209,102,0.25); }
  .card-pct.zero { background: var(--surface2); color: var(--muted); border-color: transparent; }

  .card-title-de { font-size: 1rem; font-weight: 700; line-height: 1.3; }
  .card-title-en { font-size: 0.78rem; color: var(--muted); font-family: var(--mono); margin-top: 2px; }

  .card-progress { padding: 0 1.5rem 0.75rem; }
  .progress-track { background: var(--surface2); border-radius: 100px; height: 4px; overflow: hidden; margin-bottom: 0.5rem; }
  .progress-fill { height: 100%; border-radius: 100px; background: var(--card-color, var(--blue)); transition: width 0.6s ease; }
  .progress-labels { display: flex; gap: 1rem; font-family: var(--mono); font-size: 10px; color: var(--muted); }
  .lbl-correct { color: var(--accent); }
  .lbl-wrong { color: var(--accent2); }
  .lbl-starred { color: var(--warn); }

  .card-actions { border-top: 1px solid var(--border); display: grid; grid-template-columns: repeat(4, 1fr); }
  .action-btn {
    padding: 0.7rem 0.5rem;
    background: none; border: none; border-right: 1px solid var(--border);
    color: var(--muted); font-family: var(--mono); font-size: 11px;
    cursor: pointer; transition: background 0.15s, color 0.15s;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    text-decoration: none;
  }
  .action-btn:last-child { border-right: none; }
  .action-btn:hover { background: var(--surface2); color: var(--text); }
  .action-btn .icon { font-size: 14px; }
  .action-btn.disabled { opacity: 0.3; pointer-events: none; }

  .loading { text-align: center; padding: 4rem; color: var(--muted); font-family: var(--mono); }
</style>
</head>
<body>

<div class="topbar">
  <a href="/">← Home</a>
  <span style="color:var(--border)">|</span>
  <span class="topbar-title">Learn by Topic</span>
</div>

<div class="page">
  <h2>Topics</h2>
  <p class="subtitle" id="overallLabel">Loading…</p>
  <div class="overall-bar-wrap"><div class="overall-bar-fill" id="overallBar" style="width:0%"></div></div>
  <div class="topic-list" id="topicList">
    <div class="loading">Loading topics…</div>
  </div>
</div>

<script>
const COLORS = ['#5b9cf6','#4fffb0','#ffd166','#ff6b4a','#c084fc','#34d399','#fb923c','#60a5fa','#f472b6'];
const ICONS  = {
  'Danger Teaching':                      '⚠',
  'Behaviour In Traffic':                 '🚦',
  'Technology':                           '⚙',
  'Rules On The Operation Of The Vehicles':'📋',
  'Road Sign':                            '🛑',
  'Environmental Protection':             '🌱',
  'Traffic Sign':                         '🚸',
  'Priority':                             '◆',
  'Qualification And Ability Of Drivers': '🎓',
};

async function load() {
  const res = await fetch('/api/topics/stats');
  const topics = await res.json();

  const totalQ   = topics.reduce((s,t) => s + t.total, 0);
  const totalOk  = topics.reduce((s,t) => s + t.correct, 0);
  const pctAll   = totalQ ? Math.round(totalOk / totalQ * 100) : 0;
  document.getElementById('overallLabel').textContent =
    `${totalQ} questions · ${totalOk} correct (${pctAll}% done)`;
  document.getElementById('overallBar').style.width = pctAll + '%';

  const list = document.getElementById('topicList');
  list.innerHTML = '';

  topics.forEach((t, i) => {
    const color = COLORS[i % COLORS.length];
    const pct   = t.total ? Math.round(t.correct / t.total * 100) : 0;
    const icon  = ICONS[t.topic_en] || '●';
    const pctClass = pct === 0 ? 'zero' : pct < 50 ? 'warn' : '';

    const topicParam = encodeURIComponent(t.topic_en);

    const card = document.createElement('div');
    card.className = 'topic-card';
    card.style.setProperty('--card-color', color);
    card.innerHTML = `
      <div class="card-top">
        <div class="card-meta">
          <span class="card-num">${icon} ${t.total} questions</span>
          <span class="card-pct ${pctClass}">${pct}% correct</span>
        </div>
        <div class="card-title-de">${t.topic}</div>
        <div class="card-title-en">${t.topic_en}</div>
      </div>
      <div class="card-progress">
        <div class="progress-track">
          <div class="progress-fill" style="width:${pct}%"></div>
        </div>
        <div class="progress-labels">
          <span class="lbl-correct">✓ ${t.correct} correct</span>
          <span class="lbl-wrong">✗ ${t.wrong} wrong</span>
          <span class="lbl-starred">★ ${t.starred} starred</span>
        </div>
      </div>
      <div class="card-actions">
        <a class="action-btn" href="/practice?topic=${topicParam}">
          <span class="icon">▶</span>All
        </a>
        <a class="action-btn" href="/practice?topic=${topicParam}&shuffle=1">
          <span class="icon">⇄</span>Random
        </a>
        <a class="action-btn ${t.starred === 0 ? 'disabled' : ''}" href="/practice?topic=${topicParam}&status=starred">
          <span class="icon">★</span>Starred${t.starred > 0 ? ` (${t.starred})` : ''}
        </a>
        <a class="action-btn ${t.wrong === 0 ? 'disabled' : ''}" href="/practice?topic=${topicParam}&status=wrong">
          <span class="icon">✗</span>Wrong${t.wrong > 0 ? ` (${t.wrong})` : ''}
        </a>
      </div>
    `;
    list.appendChild(card);
  });
}

load();
</script>
</body>
</html>
