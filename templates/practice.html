<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Practice — Führerschein Trainer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0f12; --surface: #161920; --surface2: #1e2229;
    --border: rgba(255,255,255,0.07); --text: #e8eaf0; --muted: #7a7f8e;
    --accent: #4fffb0; --accent2: #ff6b4a; --warn: #ffd166; --blue: #5b9cf6;
    --correct-bg: rgba(79,255,176,0.08); --correct-border: rgba(79,255,176,0.4);
    --wrong-bg: rgba(255,107,74,0.08); --wrong-border: rgba(255,107,74,0.4);
    --selected-bg: rgba(91,156,246,0.1); --selected-border: rgba(91,156,246,0.5);
    --font: 'Syne', sans-serif; --mono: 'DM Mono', monospace;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; display: grid; grid-template-columns: 1fr min(760px, 100%) 1fr; grid-template-rows: auto auto 1fr; }
  .topbar { grid-column: 1/-1; background: var(--surface); border-bottom: 1px solid var(--border); padding: 0.75rem 1.5rem; display: flex; align-items: center; gap: 1rem; }
  .topbar a { color: var(--muted); text-decoration: none; font-size: 0.85rem; font-family: var(--mono); }
  .topbar a:hover { color: var(--text); }
  .q-counter { margin-left: auto; font-family: var(--mono); font-size: 0.8rem; color: var(--muted); }
  .filter-bar { grid-column: 2; padding: 1rem 0 0; display: flex; gap: 0.5rem; flex-wrap: wrap; }
  .filter-btn { font-family: var(--mono); font-size: 11px; letter-spacing: 0.06em; padding: 5px 12px; border-radius: 100px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; transition: all 0.15s; text-transform: uppercase; }
  .filter-btn:hover, .filter-btn.active { background: var(--surface2); color: var(--text); border-color: rgba(255,255,255,0.2); }
  .filter-btn.active { border-color: var(--accent); color: var(--accent); }
  main { grid-column: 2; padding: 1.5rem 0 4rem; display: flex; flex-direction: column; gap: 1.5rem; }
  .question-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
  .q-header { padding: 1rem 1.5rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
  .q-num { font-family: var(--mono); font-size: 12px; color: var(--muted); min-width: 40px; }
  .topic-tag { font-family: var(--mono); font-size: 11px; padding: 3px 10px; border-radius: 100px; background: var(--surface2); color: var(--blue); border: 1px solid rgba(91,156,246,0.25); }
  .img-tag { font-family: var(--mono); font-size: 10px; padding: 2px 8px; border-radius: 100px; background: rgba(79,255,176,0.08); color: var(--accent); border: 1px solid rgba(79,255,176,0.2); }
  .vid-tag { font-family: var(--mono); font-size: 10px; padding: 2px 8px; border-radius: 100px; background: rgba(255,107,74,0.08); color: var(--accent2); border: 1px solid rgba(255,107,74,0.2); }
  .status-dot { margin-left: auto; width: 8px; height: 8px; border-radius: 50%; background: var(--muted); opacity: 0.4; }
  .status-dot.correct { background: var(--accent); opacity: 1; }
  .status-dot.wrong { background: var(--accent2); opacity: 1; }
  .status-dot.starred { background: var(--warn); opacity: 1; }
  .star-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; padding: 2px; transition: color 0.15s, transform 0.15s; margin-left: 4px; }
  .star-btn:hover { transform: scale(1.2); }
  .star-btn.starred { color: var(--warn); }
  .av-btn { background: none; border: 1px solid var(--border); border-radius: 6px; color: var(--muted); cursor: pointer; font-size: 10px; font-family: var(--mono); font-weight: 600; padding: 2px 6px; transition: all 0.15s; margin-left: 2px; letter-spacing: 0.05em; }
  .av-btn:hover { border-color: rgba(91,156,246,0.4); color: var(--blue); }
  .av-btn.autovio { background: rgba(91,156,246,0.12); border-color: rgba(91,156,246,0.5); color: var(--blue); }
  .q-body { padding: 1.5rem; }

  /* Media */
  .q-media { margin-bottom: 1.25rem; border-radius: 10px; overflow: hidden; background: #000; }
  .q-media img { width: 100%; display: block; max-height: 320px; object-fit: contain; background: #111; }
  .q-media video { width: 100%; display: block; max-height: 320px; background: #000; }

  .q-text-de { font-size: 1.05rem; font-weight: 600; line-height: 1.5; margin-bottom: 0.5rem; }
  .q-text-en { font-size: 0.88rem; color: var(--muted); line-height: 1.5; margin-bottom: 1.25rem; font-family: var(--mono); }
  .answers { display: flex; flex-direction: column; gap: 0.6rem; }
  .answer-btn { display: flex; align-items: flex-start; gap: 0.75rem; padding: 0.9rem 1rem; border-radius: 10px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-family: var(--font); font-size: 0.88rem; cursor: pointer; text-align: left; transition: border-color 0.15s, background 0.15s; line-height: 1.4; width: 100%; }
  .answer-btn:hover:not(:disabled) { border-color: rgba(255,255,255,0.2); background: #252b35; }
  .answer-btn:disabled { cursor: default; }
  .answer-btn.selected { background: var(--selected-bg); border-color: var(--selected-border); }
  .answer-btn.correct { background: var(--correct-bg); border-color: var(--correct-border); color: var(--accent); }
  .answer-btn.wrong { background: var(--wrong-bg); border-color: var(--wrong-border); color: var(--accent2); }
  .answer-btn.missed { background: rgba(255,209,102,0.08); border-color: rgba(255,209,102,0.4); color: var(--warn); }
  .answer-checkbox { min-width: 16px; height: 16px; border-radius: 4px; border: 1.5px solid var(--muted); margin-top: 2px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; flex-shrink: 0; font-size: 10px; }
  .answer-btn.selected .answer-checkbox { background: var(--blue); border-color: var(--blue); color: white; }
  .answer-btn.selected .answer-checkbox::after { content: '✓'; }
  .answer-btn.correct .answer-checkbox { background: var(--accent); border-color: var(--accent); color: #0d0f12; }
  .answer-btn.correct .answer-checkbox::after { content: '✓'; }
  .answer-btn.wrong .answer-checkbox { background: var(--accent2); border-color: var(--accent2); color: white; }
  .answer-btn.wrong .answer-checkbox::after { content: '✗'; }
  .answer-btn.missed .answer-checkbox { background: var(--warn); border-color: var(--warn); color: #0d0f12; }
  .answer-btn.missed .answer-checkbox::after { content: '✓'; }
  .answer-texts { flex: 1; }
  .answer-de { display: block; font-weight: 500; }
  .answer-en { display: block; color: var(--muted); font-size: 0.82rem; margin-top: 2px; font-family: var(--mono); }
  .answer-btn.correct .answer-en, .answer-btn.wrong .answer-en, .answer-btn.missed .answer-en { color: inherit; opacity: 0.7; }
  .submit-row { margin-top: 1rem; display: flex; gap: 0.75rem; align-items: center; }
  .result-banner { padding: 0.6rem 1rem; border-radius: 8px; font-size: 0.85rem; font-weight: 600; margin-top: 0.75rem; }
  .result-banner.correct { background: var(--correct-bg); color: var(--accent); border: 1px solid var(--correct-border); }
  .result-banner.wrong { background: var(--wrong-bg); color: var(--accent2); border: 1px solid var(--wrong-border); }
  .q-actions { padding: 1rem 1.5rem; border-top: 1px solid var(--border); display: flex; gap: 0.75rem; flex-wrap: wrap; }
  .btn { font-family: var(--font); font-size: 0.82rem; font-weight: 600; padding: 0.55rem 1.1rem; border-radius: 8px; border: 1px solid var(--border); cursor: pointer; transition: all 0.15s; background: var(--surface2); color: var(--muted); }
  .btn:hover { background: #252b35; color: var(--text); }
  .btn.primary { background: var(--accent); color: #0d0f12; border-color: transparent; font-weight: 700; }
  .btn.primary:hover { box-shadow: 0 4px 20px rgba(79,255,176,0.2); }
  .btn:disabled { opacity: 0.4; cursor: default; }
  .ai-panel { background: var(--surface2); border-top: 1px solid var(--border); padding: 1.2rem 1.5rem; display: none; }
  .ai-panel.open { display: block; }
  .ai-response { font-size: 0.88rem; line-height: 1.7; color: #c8d0dc; white-space: pre-wrap; word-break: break-word; }
  .ai-thinking { display: flex; align-items: center; gap: 8px; color: var(--muted); font-family: var(--mono); font-size: 12px; }
  .dots span { animation: blink 1.4s infinite both; font-size: 18px; }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100%{opacity:0} 40%{opacity:1} }
  .chat-input-row { display: flex; gap: 0.5rem; margin-top: 1rem; }
  .chat-input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: var(--font); font-size: 0.85rem; padding: 0.6rem 0.9rem; outline: none; transition: border-color 0.15s; }
  .chat-input:focus { border-color: rgba(79,255,176,0.4); }
  .chat-input::placeholder { color: var(--muted); }
  .chat-history { margin-bottom: 0.75rem; }
  .chat-msg { padding: 0.5rem 0; font-size: 0.85rem; line-height: 1.6; border-bottom: 1px solid var(--border); margin-bottom: 0.5rem; }
  .chat-msg:last-child { border-bottom: none; }
  .chat-msg .role { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.08em; }
  .chat-msg.user .role { color: var(--blue); }
  .chat-msg.assistant .role { color: var(--accent); }
  .reset-btn { margin-left: auto; color: var(--accent2) !important; border-color: rgba(255,107,74,0.3) !important; }
  .reset-btn:hover { background: rgba(255,107,74,0.08) !important; }
  .no-questions { text-align: center; padding: 4rem 2rem; color: var(--muted); font-family: var(--mono); }
  .loading-full { grid-column: 2; display: flex; align-items: center; justify-content: center; color: var(--muted); font-family: var(--mono); font-size: 0.9rem; gap: 8px; padding: 4rem; }
  .input-tag { font-family: var(--mono); font-size: 10px; padding: 2px 8px; border-radius: 100px; background: rgba(255,209,102,0.08); color: var(--warn); border: 1px solid rgba(255,209,102,0.2); }
  .number-input { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: var(--mono); font-size: 1.1rem; padding: 0.75rem 1rem; outline: none; width: 200px; transition: border-color 0.15s; text-align: center; }
  .number-input:focus { border-color: rgba(79,255,176,0.4); }
  .number-input:disabled { cursor: default; }
  .number-input::placeholder { color: var(--muted); font-size: 0.82rem; }
</style>
</head>
<body>

<div class="topbar">
  <a href="/">← Home</a>
  <span style="color:var(--border)">|</span>
  <a href="/topics">Topics</a>
  <span style="color:var(--border)">|</span>
  <span style="font-size:0.85rem;color:var(--muted);font-family:var(--mono)">Practice · Klasse B</span>
  <span class="q-counter" id="qCounter">Loading...</span>
  <button id="langToggle" onclick="toggleLang()" style="font-family:var(--mono);font-size:11px;padding:3px 10px;border-radius:100px;border:1px solid var(--border);background:var(--surface2);color:var(--accent);cursor:pointer;">EN</button>
</div>

<div class="filter-bar">
  <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
  <button class="filter-btn" onclick="setFilter('unseen',this)">Unseen</button>
  <button class="filter-btn" onclick="setFilter('wrong',this)">Wrong</button>
  <button class="filter-btn" onclick="setFilter('starred',this)">Starred</button>
  <button class="filter-btn" onclick="setFilter('correct',this)">Correct</button>
  <button class="filter-btn" onclick="setFilter('autovio',this)" style="border-color:rgba(91,156,246,0.3);color:var(--blue)">AV AutoVio</button>
  <button class="filter-btn reset-btn" onclick="resetProgress()">↺ Reset</button>
</div>
<div class="filter-bar" style="padding-top:0.4rem">
  <input id="searchBar" type="text" placeholder="Search questions in English…" oninput="renderQuestions()"
    style="flex:1;min-width:200px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--mono);font-size:0.82rem;padding:5px 12px;outline:none;transition:border-color 0.15s;"
    onfocus="this.style.borderColor='rgba(79,255,176,0.4)'" onblur="this.style.borderColor='var(--border)'">
</div>
<div class="filter-bar" style="padding-top:0.4rem">
  <button class="filter-btn type-btn active" onclick="setTypeFilter('all',this)">Any type</button>
  <button class="filter-btn type-btn" onclick="setTypeFilter('video',this)">▶ Video</button>
  <button class="filter-btn type-btn" onclick="setTypeFilter('image',this)">⬚ Image</button>
  <button class="filter-btn type-btn" onclick="setTypeFilter('text',this)">≡ Text only</button>
  <button class="filter-btn type-btn" onclick="setTypeFilter('multi',this)">✓✓ Multi-answer</button>
</div>

<main id="mainContent">
  <div class="loading-full"><div class="dots"><span>.</span><span>.</span><span>.</span></div> Loading questions</div>
</main>

<script>
let aiLang = localStorage.getItem('aiLang') || 'en';
function toggleLang() {
  aiLang = aiLang === 'en' ? 'de' : 'en';
  localStorage.setItem('aiLang', aiLang);
  document.getElementById('langToggle').textContent = aiLang.toUpperCase();
  document.getElementById('langToggle').style.color = aiLang === 'de' ? 'var(--warn)' : 'var(--accent)';
}
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('langToggle').textContent = aiLang.toUpperCase();
  document.getElementById('langToggle').style.color = aiLang === 'de' ? 'var(--warn)' : 'var(--accent)';
});

let allQuestions = [];
let currentTypeFilter = 'all';
const selectedAnswers = {};
const params = new URLSearchParams(window.location.search);
const topicFilter  = params.get('topic')  || '';
const statusParam  = params.get('status') || '';
const shuffleParam = params.get('shuffle') === '1';

let currentStatusFilter = statusParam || 'all';

async function loadQuestions(filter = currentStatusFilter) {
  currentStatusFilter = filter;
  const main = document.getElementById('mainContent');
  main.innerHTML = '<div class="loading-full"><div class="dots"><span>.</span><span>.</span><span>.</span></div> Loading questions</div>';

  let url = '/api/questions?limit=2500';
  if (topicFilter) url += `&topic=${encodeURIComponent(topicFilter)}`;
  // autovio filter is client-side; other status filters are server-side
  if (filter !== 'all' && filter !== 'autovio') url += `&status=${filter}`;

  const res = await fetch(url);
  allQuestions = await res.json();
  if (shuffleParam) allQuestions.sort(() => Math.random() - 0.5);
  renderQuestions();
}

function applyTypeFilter(questions) {
  if (currentTypeFilter === 'all') return questions;
  if (currentTypeFilter === 'video') return questions.filter(q => q.video);
  if (currentTypeFilter === 'image') return questions.filter(q => q.image && !q.video);
  if (currentTypeFilter === 'text') return questions.filter(q => !q.image && !q.video);
  if (currentTypeFilter === 'multi') return questions.filter(q => q.answers.filter(a => a.correct).length > 1);
  return questions;
}

function applySearch(questions) {
  const q = (document.getElementById('searchBar')?.value || '').toLowerCase().trim();
  if (!q) return questions;
  return questions.filter(ques =>
    ques.question_en.toLowerCase().includes(q) ||
    ques.answers.some(a => a.text_en.toLowerCase().includes(q))
  );
}

function renderQuestions() {
  const main = document.getElementById('mainContent');
  let filtered = allQuestions;
  if (currentStatusFilter === 'autovio') filtered = allQuestions.filter(q => q.autovio);
  const visible = applySearch(applyTypeFilter(filtered));
  document.getElementById('qCounter').textContent = `${visible.length} questions`;

  if (visible.length === 0) {
    main.innerHTML = '<div class="no-questions">No questions found for this filter.</div>';
    return;
  }

  main.innerHTML = '';
  visible.forEach((q, idx) => main.appendChild(buildCard(q, idx + 1)));
}

function setTypeFilter(type, btn) {
  currentTypeFilter = type;
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderQuestions();
}

async function resetProgress() {
  if (!confirm('Reset all progress? This clears correct/wrong status. Stars and AutoVio tags are preserved.')) return;
  await fetch('/api/progress', { method: 'DELETE' });
  location.reload();
}

function buildCard(q, num) {
  const card = document.createElement('div');
  card.className = 'question-card';
  card.id = `card-${q.id}`;
  const isStarred = q.starred === true;
  selectedAnswers[q.id] = new Set();

  // Media tag
  const isInput = q.type === 'input';
  const mediaTag = q.video
    ? `<span class="vid-tag">▶ video</span>`
    : q.image ? `<span class="img-tag">⬚ image</span>`
    : isInput ? `<span class="input-tag">✎ input</span>` : '';

  // Media block
  let mediaBlock = '';
  if (q.video) {
    mediaBlock = `<div class="q-media"><video controls preload="none" src="${q.video}"></video></div>`;
  } else if (q.image) {
    mediaBlock = `<div class="q-media"><img src="${q.image}" alt="Question image" loading="lazy"></div>`;
  }

  card.innerHTML = `
    <div class="q-header">
      <span class="q-num">#${q.id}</span>
      <span class="topic-tag">${q.topic_en}</span>
      ${mediaTag}
      <span class="status-dot ${q.status !== 'unseen' ? q.status : (q.starred ? 'starred' : '')}" id="dot-${q.id}"></span>
      <button class="av-btn ${q.autovio ? 'autovio' : ''}" id="av-${q.id}" onclick="toggleAutovio(${q.id})" title="Mark as seen in AutoVio">AV</button>
      <button class="star-btn ${isStarred ? 'starred' : ''}" id="star-${q.id}" onclick="toggleStar(${q.id})">★</button>
    </div>
    <div class="q-body">
      ${mediaBlock}
      <div class="q-text-de">${q.question_de}</div>
      <div class="q-text-en">${q.question_en}</div>
      <div class="answers" id="answers-${q.id}">
        ${isInput ? `
          <input class="number-input" id="inputans-${q.id}" type="text" placeholder="Type your answer…"
            oninput="document.getElementById('submitbtn-${q.id}').disabled = !this.value.trim()"
            onkeydown="if(event.key==='Enter')submitInputAnswer(${q.id})">
        ` : q.answers.map(a => `
          <button class="answer-btn" id="ans-${q.id}-${a.id}" onclick="toggleAnswer(${q.id},'${a.id}')">
            <span class="answer-checkbox"></span>
            <span class="answer-texts">
              <span class="answer-de">${a.text_de}</span>
              <span class="answer-en">${a.text_en}</span>
            </span>
          </button>
        `).join('')}
      </div>
      <div class="submit-row">
        <button class="btn primary" id="submitbtn-${q.id}" onclick="${isInput ? `submitInputAnswer(${q.id})` : `submitAnswers(${q.id})`}" disabled>Submit</button>
        <span id="selcount-${q.id}" style="font-family:var(--mono);font-size:12px;color:var(--muted)"></span>
      </div>
      <div id="result-${q.id}"></div>
    </div>
    <div class="q-actions">
      <button class="btn primary" onclick="toggleAI(${q.id},'explain')">✦ Explain</button>
      <button class="btn" onclick="toggleAI(${q.id},'chat')">Chat with AI</button>
    </div>
    <div class="ai-panel" id="ai-${q.id}">
      <div id="airesp-${q.id}"></div>
      <div class="chat-history" id="chathist-${q.id}"></div>
      <div class="chat-input-row" id="chatrow-${q.id}" style="display:none">
        <input class="chat-input" id="chatinput-${q.id}" placeholder="Ask something..." onkeydown="if(event.key==='Enter')sendChat(${q.id})">
        <button class="btn primary" onclick="sendChat(${q.id})">Send</button>
        <button class="btn" onclick="clearChat(${q.id})" title="Clear chat history" style="color:var(--muted);font-size:0.78rem;">✕ Clear</button>
      </div>
    </div>
  `;

  if (q.status === 'correct') {
    setTimeout(() => restoreAnswerState(q), 0);
  }

  return card;
}

function toggleAnswer(qid, answerId) {
  const btn = document.getElementById(`ans-${qid}-${answerId}`);
  const sel = selectedAnswers[qid];

  if (sel.has(answerId)) {
    sel.delete(answerId);
    btn.classList.remove('selected');
  } else {
    sel.add(answerId);
    btn.classList.add('selected');
  }

  const submitBtn = document.getElementById(`submitbtn-${qid}`);
  const countEl = document.getElementById(`selcount-${qid}`);
  if (submitBtn) submitBtn.disabled = sel.size === 0;
  if (countEl) countEl.textContent = sel.size > 0 ? `${sel.size} selected` : '';
}

async function submitAnswers(qid) {
  const sel = selectedAnswers[qid];
  if (sel.size === 0) return;

  const res = await fetch('/api/answer', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ question_id: qid, chosen_answers: Array.from(sel) })
  });
  const data = await res.json();

  // Disable everything
  document.getElementById(`answers-${qid}`).querySelectorAll('.answer-btn').forEach(b => b.disabled = true);
  document.getElementById(`submitbtn-${qid}`).disabled = true;
  document.getElementById(`selcount-${qid}`).textContent = '';

  const q = allQuestions.find(q => q.id === qid);
  q.answers.forEach(a => {
    const btn = document.getElementById(`ans-${qid}-${a.id}`);
    const wasChosen = sel.has(a.id);
    const isCorrect = data.correct_answers.includes(a.id);
    btn.classList.remove('selected');
    if (isCorrect && wasChosen) btn.classList.add('correct');
    else if (!isCorrect && wasChosen) btn.classList.add('wrong');
    else if (isCorrect && !wasChosen) btn.classList.add('missed');
  });

  const resultEl = document.getElementById(`result-${qid}`);
  resultEl.innerHTML = data.correct
    ? `<div class="result-banner correct">✓ Correct!</div>`
    : `<div class="result-banner wrong">✗ Wrong — yellow = answer you missed, red = wrong choice</div>`;

  const dot = document.getElementById(`dot-${qid}`);
  if (dot) dot.className = `status-dot ${data.status}`;

  if (!data.correct) setTimeout(() => toggleAI(qid, 'explain', Array.from(sel)), 400);
}

async function submitInputAnswer(qid) {
  const input = document.getElementById(`inputans-${qid}`);
  const val = input.value.trim();
  if (!val) return;

  const q = allQuestions.find(q => q.id === qid);
  const correctRaw = q.correct_answer;

  function normalize(s) {
    const n = parseFloat(String(s).replace(',', '.'));
    return isNaN(n) ? String(s).toLowerCase().trim() : n;
  }
  const isCorrect = normalize(val) === normalize(correctRaw);
  const status = isCorrect ? 'correct' : 'wrong';

  input.disabled = true;
  document.getElementById(`submitbtn-${qid}`).disabled = true;

  const resultEl = document.getElementById(`result-${qid}`);
  if (isCorrect) {
    resultEl.innerHTML = `<div class="result-banner correct">✓ Correct! Answer: ${correctRaw}</div>`;
    input.style.borderColor = 'rgba(79,255,176,0.4)';
    input.style.color = 'var(--accent)';
  } else {
    resultEl.innerHTML = `<div class="result-banner wrong">✗ Wrong — correct answer: <strong>${correctRaw}</strong></div>`;
    input.style.borderColor = 'rgba(255,107,74,0.4)';
    input.style.color = 'var(--accent2)';
  }

  await fetch('/api/status', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({question_id: qid, status}) });
  const dot = document.getElementById(`dot-${qid}`);
  if (dot) dot.className = `status-dot ${status}`;
  q.status = status;

  if (!isCorrect) setTimeout(() => toggleAI(qid, 'explain'), 400);
}

function restoreAnswerState(q) {
  if (q.type === 'input') {
    const input = document.getElementById(`inputans-${q.id}`);
    if (input) {
      input.value = q.correct_answer;
      input.disabled = true;
      input.style.borderColor = 'rgba(79,255,176,0.4)';
      input.style.color = 'var(--accent)';
    }
    const submitBtn = document.getElementById(`submitbtn-${q.id}`);
    if (submitBtn) submitBtn.disabled = true;
    return;
  }
  q.answers.forEach(a => {
    const btn = document.getElementById(`ans-${q.id}-${a.id}`);
    if (btn) { btn.disabled = true; if (a.correct) btn.classList.add('correct'); }
  });
  const submitBtn = document.getElementById(`submitbtn-${q.id}`);
  if (submitBtn) submitBtn.disabled = true;
}

async function toggleAutovio(qid) {
  const btn = document.getElementById(`av-${qid}`);
  const res = await fetch('/api/autovio', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({question_id: qid}) });
  const data = await res.json();
  btn.classList.toggle('autovio', data.autovio);
  const q = allQuestions.find(q => q.id === qid);
  if (q) q.autovio = data.autovio;
}

async function toggleStar(qid) {
  const btn = document.getElementById(`star-${qid}`);
  const res = await fetch('/api/starred', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({question_id: qid}) });
  const data = await res.json();
  btn.classList.toggle('starred', data.starred);
  const q = allQuestions.find(q => q.id === qid);
  if (q) q.starred = data.starred;
}

async function toggleAI(qid, mode, chosenAnswers = null) {
  const panel = document.getElementById(`ai-${qid}`);
  const resp = document.getElementById(`airesp-${qid}`);
  const chatrow = document.getElementById(`chatrow-${qid}`);
  panel.classList.add('open');

  if (mode === 'chat') {
    resp.innerHTML = '';
    chatrow.style.display = 'flex';
    document.getElementById(`chatinput-${qid}`).focus();
    return;
  }

  chatrow.style.display = 'none';
  resp.innerHTML = '<div class="ai-thinking"><div class="dots"><span>.</span><span>.</span><span>.</span></div> Thinking...</div>';

  const body = { question_id: qid };
  if (chosenAnswers) body.chosen_answers = chosenAnswers;

  body.language = aiLang;
  const res = await fetch('/api/explain', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
  const data = await res.json();
  resp.innerHTML = `<div class="ai-response">${escapeHtml(data.explanation)}</div>`;
}

async function sendChat(qid) {
  const input = document.getElementById(`chatinput-${qid}`);
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  const hist = document.getElementById(`chathist-${qid}`);
  hist.innerHTML += `<div class="chat-msg user"><div class="role">You</div><div>${escapeHtml(msg)}</div></div>`;
  const loadingId = `l-${qid}-${Date.now()}`;
  hist.innerHTML += `<div class="chat-msg assistant" id="${loadingId}"><div class="role">AI</div><div class="ai-thinking"><div class="dots"><span>.</span><span>.</span><span>.</span></div></div></div>`;
  const chatBody = {question_id: qid, message: msg};
  if (selectedAnswers[qid] && selectedAnswers[qid].size > 0) chatBody.chosen_answers = Array.from(selectedAnswers[qid]);
  chatBody.language = aiLang;
  const res = await fetch('/api/chat', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(chatBody) });
  const data = await res.json();
  const el = document.getElementById(loadingId);
  if (el) el.innerHTML = `<div class="role">AI</div><div>${escapeHtml(data.reply)}</div>`;
}

async function clearChat(qid) {
  await fetch(`/api/chat/${qid}`, { method: 'DELETE' });
  document.getElementById(`chathist-${qid}`).innerHTML = '';
  document.getElementById(`airesp-${qid}`).innerHTML = '';
}

function setFilter(f, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadQuestions(f);
}

function escapeHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

loadQuestions();
</script>
</body>
</html>
